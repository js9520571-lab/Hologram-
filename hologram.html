<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Anime Hologram - Talking Edition</title>
    <style>
        body {
            margin: 0; background: #000; height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Courier New', monospace;
        }

        #ui { text-align: center; z-index: 100; }

        /* The Hologram Effect */
        #hologram-wrap {
            display: none; position: relative;
            width: 350px; height: 500px;
            animation: startup 0.5s ease-out;
        }

        /* Image Styling */
        #anime-img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 20px #00ffff) brightness(1.2) cyan;
            opacity: 0.8;
            animation: float 3s ease-in-out infinite, flicker 0.2s infinite;
        }

        /* Hologram Scanlines Overlay */
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 255, 0.1) 50%);
            background-size: 100% 4px; pointer-events: none;
        }

        /* Animations */
        @keyframes startup {
            from { opacity: 0; transform: scaleY(0); }
            to { opacity: 1; transform: scaleY(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); filter: hue-rotate(0deg); }
            50% { transform: translateY(-20px) hue-rotate(20deg); }
        }

        @keyframes flicker {
            0% { opacity: 0.8; } 50% { opacity: 0.75; } 100% { opacity: 0.85; }
        }

        button {
            padding: 20px 40px; font-size: 20px; background: none;
            border: 2px solid #00ffff; color: #00ffff; cursor: pointer;
            box-shadow: 0 0 15px #00ffff; text-transform: uppercase;
        }

        button:hover { background: #00ffff; color: #000; }

        .glow-base {
            position: absolute; bottom: -10px; left: 50%;
            transform: translateX(-50%); width: 250px; height: 40px;
            background: rgba(0, 255, 255, 0.4); filter: blur(20px); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button onclick="bootSystem()">Activate Hologram</button>
        <p id="loading" style="display:none; color:#00ffff; margin-top:20px;">LINKING NEURAL INTERFACE...</p>
    </div>

    <div id="hologram-wrap">
        <div class="scanlines"></div>
        <!-- High-stability image from Wikimedia Commons -->
        <img id="anime-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Anime_Girl.png/640px-Anime_Girl.png" alt="Anime Character">
        <div class="glow-base"></div>
    </div>

    <script>
        function bootSystem() {
            // 1. UI Transition
            document.querySelector('button').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // 2. Wait and Launch
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('hologram-wrap').style.display = 'block';
                
                // 3. Voice Logic (Text to Speech)
                speak();
            }, 2000);
        }

        function speak() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "Holographic interface online. Hello! I am your AI assistant. How can I help you make money today?";
            msg.pitch = 1.2; // Makes the voice sound more like an anime character
            msg.rate = 1;
            window.speechSynthesis.speak(msg);
        }

        // Error Handling: If image fails, show a placeholder
        document.getElementById('anime-img').onerror = function() {
            this.src = "https://via.placeholder.com/400x600/00ffff/000000?text=AI+ENTITY+ACTIVE";
            console.log("Image blocked, using fail-safe.");
        };
    </script>
</body>
</html>
